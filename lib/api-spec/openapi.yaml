openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Indo-German Mobility Corridor Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: candidates
  - name: employers
  - name: vacancies
  - name: applications
  - name: documents
  - name: training
  - name: recognition
  - name: visa
  - name: welfare
  - name: notifications
  - name: analytics
  - name: interviews
  - name: offers

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ─────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  # ── CANDIDATES ───────────────────────────────────────────────────────────────
  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List all candidates (admin/facilitator/employer/govt)
      parameters:
        - name: stage
          in: query
          schema:
            type: string
        - name: occupation
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
        - name: readinessMin
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Candidate list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"

  /candidates/me:
    get:
      operationId: getMyCandidateProfile
      tags: [candidates]
      summary: Get my candidate profile
      responses:
        "200":
          description: Candidate profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
    patch:
      operationId: updateMyCandidateProfile
      tags: [candidates]
      summary: Update my candidate profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/me/readiness:
    get:
      operationId: getMyReadinessScore
      tags: [candidates]
      summary: Get my readiness score breakdown
      responses:
        "200":
          description: Readiness score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessScore"

  /candidates/me/journey:
    get:
      operationId: getMyJourney
      tags: [candidates]
      summary: Get full journey/stage status
      responses:
        "200":
          description: Journey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateJourney"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  # ── EMPLOYERS ────────────────────────────────────────────────────────────────
  /employers:
    get:
      operationId: listEmployers
      tags: [employers]
      summary: List employers
      responses:
        "200":
          description: Employers
          content:
