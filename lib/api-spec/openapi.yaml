      tags: [employers]
      summary: Get my employer profile
      responses:
        "200":
          description: Employer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employer"
    patch:
      operationId: updateMyEmployerProfile
      tags: [employers]
      summary: Update my employer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployerUpdate"
      responses:
        "200":
