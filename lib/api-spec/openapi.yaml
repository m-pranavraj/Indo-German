          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Vacancies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vacancy"
    post:
      operationId: createVacancy
      tags: [vacancies]
      summary: Create vacancy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VacancyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vacancy"

  /vacancies/{id}:
    get:
      operationId: getVacancy
      tags: [vacancies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vacancy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vacancy"
    patch:
      operationId: updateVacancy
      tags: [vacancies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VacancyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vacancy"

  /vacancies/{id}/matches:
    get:
      operationId: getVacancyMatches
